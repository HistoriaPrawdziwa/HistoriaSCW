<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Strona testowa</title>

  <style>
    body {
      font-family: monospace;
      max-width: 900px;
      margin: auto;
      padding: 20px;
      background-color: black;
      color: lime;
      text-align: center; /* 👈 WYŚRODKOWANIE TEKSTU */
    }

    .box {
      background: #111;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
      border: 1px solid lime;
    }

    .clock, .countdown {
      margin-top: 10px;
      font-size: 18px;
    }

    .countdown {
      font-weight: bold;
      color: red;
    }

    a {
      color: cyan;
      display: block;
      margin-top: 20px;
    }

    video {
      margin-top: 20px;
      border: 1px solid lime;
      border-radius: 8px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    img {
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid lime;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>

<body>

  <h2>Kim jest osoba opisana w materiale?</h2>

  <video controls width="100%">
    <source src="videotest1.mp4" type="video/mp4">
    Twoja przeglądarka nie obsługuje wideo.
  </video>

  <h1>Aktualnie trwa test dla (ETAP KOŃCOWY)</h1>

  <div class="clock" id="clock"></div>
  <div class="countdown" id="countdown"></div>

  <div class="box">
    <h2>Opis</h2>
    <p>Aktualnie trwa test dla (ETAP KOŃCOWY)</p>

    <img src="Screenshot1.png" width="100%">
    <img src="Screenshot2.png" width="100%">
  </div>

  <a href="binarny.html">Przejdź PO WIĘCEJ SZCZEGÓŁOWYCH INFORMACJI</a>

  <script>
    const endDate = new Date("2026-06-05T00:00:00");

    function updateClock() {
      const now = new Date();
      document.getElementById("clock").innerText =
        "Data i godzina: " + now.toLocaleString();
    }

    function updateCountdown() {
      const now = new Date();
      const diff = endDate - now;

      if (diff <= 0) {
        document.getElementById("countdown").innerText = "Czas minął";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("countdown").innerText =
        "Pozostało: " + days + " dni, " +
        hours + " godz., " +
        minutes + " min., " +
        seconds + " sek.";
    }

    setInterval(updateClock, 1000);
    setInterval(updateCountdown, 1000);

    updateClock();
    updateCountdown();
  </script>

</body>
</html>
