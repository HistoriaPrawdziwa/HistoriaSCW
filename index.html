<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Jakub P.</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: auto;
      padding: 20px;
      line-height: 1.6;
      background-color: #f5f5f5;
    }

    .box {
      background: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
    }

    h1 {
      font-size: 26px;
    }

    img {
      margin-top: 10px;
      border-radius: 8px;
    }

    .clock {
      font-size: 18px;
      margin-top: 10px;
    }

    .countdown {
      font-size: 20px;
      font-weight: bold;
      color: #c00;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>Aktualnie trwa test dla (ETAP KOŃCOWY)</h1>

  <div class="clock" id="clock"></div>
  <div class="countdown" id="countdown"></div>

  <div class="box">
    <h2>Opis</h2>
    <p>Aktualnie trwa test dla (ETAP KOŃCOWY)</p>

    <<img src="Screenshot1.png" alt="screen" width="100%">
    <<img src="Screenshot2.png" alt="screen" width="100%">
    </div>

  <div class="box">
    <h2>Dodatkowe informacje</h2>
    <p>Aktualnie trwa test dla (ETAP KOŃCOWY)</p>
  </div>

  <div class="box">
    <h2>Analiza</h2>
    <p>Aktualnie trwa test dla (ETAP KOŃCOWY)</p>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById("clock").innerText =
        "Data i godzina: " + now.toLocaleString();
    }

    const endDate = new Date();
    endDate.setDate(endDate.getDate() + 31);

    function updateCountdown() {
      const now = new Date();
      const diff = endDate - now;

      if (diff <= 0) {
        document.getElementById("countdown").innerText = "Czas minął";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("countdown").innerText =
        "Pozostało: " + days + " dni, " +
        hours + " godz., " +
        minutes + " min., " +
        seconds + " sek.";
    }

    setInterval(updateClock, 1000);
    setInterval(updateCountdown, 1000);

    updateClock();
    updateCountdown();
  </script>

</body>
</html>
