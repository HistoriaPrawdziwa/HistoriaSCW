<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokój Dowody</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', monospace;
  background: #0b0f14;
  color: #e6edf3;
  display: flex;
  justify-content: center;
}

.container {
  width: 94%;
  max-width: 820px;
  padding: 30px 18px 60px 18px;
}

h1 {
  text-align: center;
  font-weight: 500;
  letter-spacing: 2px;
  margin-bottom: 40px;
  color: #00ff88;
}

.evidence-box {
  background: #11161d;
  border-radius: 16px;
  padding: 25px;
  margin-bottom: 25px;
  border: 1px solid rgba(255,255,255,0.06);
  transition: 0.3s ease;
}

.evidence-box:hover {
  background: #161c24;
}

.evidence-box h3 {
  margin-top: 0;
  font-weight: 600;
  letter-spacing: 1px;
}

.evidence-box p {
  font-style: italic;
  line-height: 1.7;
  margin-bottom: 15px;
}

audio, video {
  width: 100%;
  margin-top: 10px;
  border-radius: 8px;
}

.download-link {
  display: inline-block;
  margin-top: 12px;
  text-decoration: none;
  color: #ffffff;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px;
  transition: 0.3s ease;
}

.download-link:hover {
  background: rgba(255,255,255,0.05);
}

.back-link {
  text-align: center;
  margin-top: 50px;
}

.back-link a {
  text-decoration: none;
  color: #ffffff;
  font-size: 14px;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 8px 16px;
  border-radius: 6px;
}
</style>
</head>

<body>
<div class="container">

<h1>POKÓJ – DOWODY</h1>

<!-- AUDIO -->
<div class="evidence-box">
<h3>🎧 Nagranie Audio</h3>
<p>Fragment rozmowy zabezpieczony jako materiał pomocniczy.</p>

<audio controls>
  <source src="audio1.mp3" type="audio/mpeg">
  Twoja przeglądarka nie obsługuje audio.
</audio>

<a href="audio1.mp3" class="download-link" download>
⬇ Pobierz nagranie
</a>
</div>

<!-- VIDEO -->
<div class="evidence-box">
<h3>🎥 Materiał Wideo</h3>
<p>Zapis wizualny zdarzenia.</p>

<video controls>
  <source src="video1.mp4" type="video/mp4">
  Twoja przeglądarka nie obsługuje wideo.
</video>

<a href="video1.mp4" class="download-link" download>
⬇ Pobierz wideo
</a>
</div>

<!-- LOGI -->
<div class="evidence-box">
<h3>📄 Logi systemowe</h3>
<p>Plik tekstowy zawierający zapis zdarzeń.</p>

<a href="logi.txt" class="download-link" download>
⬇ Pobierz logi.txt
</a>
</div>

<div class="back-link">
<a href="index.html">← Powrót do raportu</a>
</div>

</div>
</body>
</html>
