<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raport – Dostęp Chroniony</title>

<style>
body{
  margin:0;
  background:#0d1117;
  color:#e6edf3;
  font-family:'Segoe UI', monospace;
  display:flex;
  justify-content:center;
}

.container{
  width:94%;
  max-width:760px;
  padding:40px 20px;
}

.panel{
  background:linear-gradient(145deg,#161b22,#11161d);
  padding:35px 30px;
  border-radius:24px;
  border:1px solid rgba(0,255,136,0.15);
  box-shadow:0 0 40px rgba(0,255,136,0.05);
}

h2{
  text-align:center;
  color:#00ff88;
  margin-bottom:30px;
  font-weight:500;
  letter-spacing:1px;
}

.input-box{
  text-align:center;
  margin-bottom:25px;
}

input{
  background:#0f141a;
  border:1px solid rgba(0,255,136,0.25);
  padding:10px 14px;
  border-radius:12px;
  color:#fff;
  width:70%;
  max-width:320px;
  font-family:monospace;
}

button{
  margin-top:15px;
  padding:8px 18px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  background:#161b22;
  color:#ffffff;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#1f2933;
}

.hint{
  margin-top:15px;
  font-size:13px;
  color:#8b949e;
  text-align:center;
  font-style:italic;
}

.output{
  margin-top:30px;

  padding:25px;

  border:1px solid rgba(255,255,255,0.08);
